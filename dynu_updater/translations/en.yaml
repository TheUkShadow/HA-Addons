---
configuration:
  dynu_hostname:
    name: Dynu Hostname
    description: The primary hostname for the Dynu account (eg yourdomain.com).
  dynu_api_key:
    name: Dynu API Key
    description: Available from the dns control panel at dynu.com and used to retrieve IPv6 status and in the creation of certificates.
  verbose:
    name: Verbose Mode
    description: Provides more detailed log output.
  dns:
    name: IP Update Options
    description: Options for updating IP addresses
    fields:
      update_ip:
        name: Update IP Addresses
        description: The addon will monitor and update IP addresses for the hostnames listed in IP Update Hostnames
      dynu_update_password:
        name: Dynu Account Password
        description: This is either the account password, or the IP Update password
      domains:
        name: Hostnames
        description: Hostnames listed here will have their IP address information updated (eg yourdomain.com, example.yourdomain.com, *.yourdomain.com)
  cert:
    name: Certificate Options
    description: Options for the Certificate Request using Let's Encrypt
    fields:
      update_cert:
        name: Generate Certificate
        description: The addon will generate a certificate for the hostnames listed in Certificate Hostnames
      email:
        name: Email Address
        description: The email address that will be used to register the certificate (eg admin@yourdomain.com).
      update_cert_days:
        name: Renew Days
        description: This is the number of days before the certificate expires to generate a new certificate (1 - 30)
      domains:
        name: Hostnames
        description: Hostnames listed here will be included in the certificate request (eg yourdomain.com, example.yourdomain.com, *.yourdomain.com)
      keyfile:
        name: Private Key File
        description: Name of the Private Key File for the created certificate. This will be placed in /ssl
      certfile:
        name: Certificate File
        description: Name of the Certificate File for the created certificate. This will be placed in /ssl
      restart_addons:
        name: Restart Apps
        description: A list of apps to restart when the certificate is created/renewed (eg a0d7b954-nodered or core-nginx-proxy)
      force_renew:
        name: Force Renew
        description: Force certificate renewal even if it is not close to expiry.
      dry_run:
        name: Test Run
        description: Performs a test of the Certificate creation/renewal without changing/updating any certificates. 
  mqtt:
    name: MQTT
    description: Creates MQTT Sensors for use in automations, etc.
    fields:
      enabled:
        name: Enabled
        description: Enables MQTT
      core:
        name: Core Mosquitto Credentials
        description: The User and Password from the Mosquitto Addon will be used, if it is installed.
      host:
        name: Hostname
        description: The hostname for the MQTT server (eg core-mosquitto, localhost, yourdomain.com, 192.168.4.10).
      port:
        name: Port
        description: The port for the MQTT server (eg 1883 or 8883 when using TLS).
      user:
        name: User
        description: The username for the MQTT server (Not required if using Core Mosqitto Credentials).
      password:
        name: Password
        description: The password for the MQTT server (Not required if using Core Mosqitto Credentials).
      tls:
        name: TLS
        description: Enables TLS for the MQTT server.
      server_cert:
        name: Validate Server Certificate
        description: When connecting using TLS, the Hostname will be validated using the server Certificate.
      keyfile:
        name: Private Key File
        description: The Private Key File to use for MQTT TLS
      certfile:
        name: Certificate File
        description: The Certificate File to use for MQTT TLS
      cafile:
        name: CA File
        description: The CA File to use for MQTT TLS
