---
configuration:
  mqtt_conf:
    name: MQTT Configuration
    description: Allows custom MQTT configuration. If not set, the system MQTT server will be used, if available.
  mqtt:
    name: MQTT
    description: Creates MQTT Sensors for use in automations, etc.
  mqtt_host:
    name: MQTT Hostname
    description: The hostname for the MQTT server.
  mqtt_port:
    name: MQTT Port
    description: The port for the custom MQTT server
  mqtt_user:
    name: MQTT User
    description: The username for the MQTT server.
  mqtt_password:
    name: MQTT Password
    description: The password for the MQTT server.
  update_cert_time:
    name: Certificate Check Time
    description: The time of day to check the certifcate renewal status (00:00 - 23:59)
  update_ip:
    name: Update IP Addresses
    description: The addon will monitor and update IP addresses for the hostnames listed in DNS Update Hostnames
  update_cert:
    name: Generate Certificate
    description: The addon will generate a certificate for the hostnames listed in Certificate Hostnames
  dynu_hostname:
    name: Dynu Hostname
    description: The primary hostname for the Dynu account (eg yourdomain.com).
  ip_domains:
    name: DNS Update Hostnames
    description: Hostnames listed here will have their IP address information updated (eg yourdomain.com, example.yourdomain.com)
  domains:
    name: Certificate Hostnames
    description: Hostnames listed here will be included in the certificate request (eg yourdomain.com, example.yourdomain.com or *.yourdomain.com)
  email:
    name: Domain Email
    description: The email address that will be used to register the certificate (eg admin@yourdomain.com).
  dynu_update_password:
    name: Dynu Account Password
    description: This is either the account password, or the IP Update password
  dynu_api_key:
    name: Dynu API Key
    description: Available from the dns control panel at dynu.com and used in the certifcate request service.
  keyfile:
    name: Private Key File
    description: Name of the Private Key File. This will be placed in /ssl
  certfile:
    name: Certificate File
    description: Name of the Certificate File. This will be placed in /ssl
  restart_addons:
    name: Restart Addons
    description: A list of addons to restart when the certificate is created/renewed (eg a0d7b954-nodered or core-nginx-proxy)
  verbose:
    name: Verbose Mode
    description: Provides more detailed log output.
  force_renew:
    name: Force Renew
    description: Force certificate renewal even if it is not close to expiry.
  dry_run:
    name: Dry Run
    description: Do a Certbot dry-run for requesting the certificate from Let's Encrypt.
network:
  8855/tcp: Websocket port for Integration connection.
