---
version: 1.1.44
slug: dynu_updater
name: Dynu Domain Update Tool
description: Update dynamic IP addresses and generate a SSL certificate for a domain registerd with dynu.com
url: https://github.com/TheUkShadow/HA-Addons/blob/main/dynu_updater

homeassistant_api: true

services:
  - mqtt:need
  
arch:
  - aarch64
  - amd64
  
boot: auto

init: false

map:
  - ssl:rw
  
options:
  dns:
    update_ip: true
    update_interval: 1
    disable_ipv6: false
  cert:
    update_cert: true
    keyfile: privkey.pem
    certfile: fullchain.pem
    update_cert_days: 5
    force_renew: false
    dry_run: false
  mqtt:
    enabled: false
    core: true
    host: core-mosquitto
    port: 1883
    tls: false
    server_cert: false
  events: false
  log_level: info
  
schema:
  dynu_hostname: str
  dynu_api_key: password
  dns:
    update_ip: bool
    dynu_update_password: password?
    update_interval: int(1,60)
    domains:
      - str?
    disable_ipv6: bool
  cert:
    update_cert: bool
    email: email?
    update_cert_days: int(1,30)
    domains:
      - str?
    keyfile: str?
    certfile: str?
    force_renew: bool
    dry_run: bool
  mqtt:
    enabled: bool
    core: bool
    host: str?
    port: int?
    user: str?
    password: password?
    tls: bool
    server_cert: bool
    keyfile: str?
    certfile: str?
    cafile: str?
  events: bool
  log_level: list(debug|info|warning|error)

startup: application