---
version: 1.0.2
slug: dynu-updater
name: Dynu Domain Update Tool
description: Update dynamic DNS and generate certificates for a domain registerd with dynu.com
url: https://github.com/TheUkShadow/HA-Addons/tree/main/dynu-updater
hassio_api: true
hassio_role: manager
arch:
  - aarch64
  - amd64
boot: auto
init: false
map:
  - ssl:rw
  - share
options:
  update_ip: true
  update_cert: true
  keyfile: privkey.pem
  certfile: fullchain.pem
schema:
  dynu_hostname: 'match(^[A-Za-z0-9.-]+\.[A-Za-z]{2,}(?:\.[A-Za-z]{2,})*$)'
  dynu_update_password: password
  dynu_api_key: password
  email: email
  domains: []
  ip_domains: []
  
  update_ip: bool
  ip_domains:
    - 'match(^[A-Za-z0-9.-]+\.[A-Za-z]{2,}(?:\.[A-Za-z]{2,})*$)'
    
  update_cert: bool
  domains:
    - 'match(^[A-Za-z0-9.-]+\.[A-Za-z]{2,}(?:\.[A-Za-z]{2,})*$)'
  keyfile: str
  certfile: str
  
  restart_addons:
    - str?

  verbose: bool?
  force_renew: bool?

startup: services
