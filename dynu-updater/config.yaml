---
version: 1.0.2
slug: dynu-updater
name: Dynu Domain Update Tool
description: Update dynamic DNS and generate certificates for a domain registerd with dynu.com
url: https://github.com/TheUkShadow/HA-Addons/tree/main/dynu-updater
hassio_api: true
hassio_role: manager
arch:
  - aarch64
  - amd64
boot: auto
init: false

map:
  - ssl:rw
  - share
options:
  update_ip: true
  update_cert: true
  keyfile: privkey.pem
  certfile: fullchain.pem
  update_cert_time: "00:00"
  
schema:
  dynu_hostname: str
  dynu_update_password: password
  dynu_api_key: password
  email: email
  
  update_ip: bool
  ip_domains:
    - str
    
  update_cert: bool
  update_cert_time: str
  domains:
    - str
    
  keyfile: str
  certfile: str
  
  restart_addons:
    - str?

  verbose: bool?
  force_renew: bool?

startup: services
